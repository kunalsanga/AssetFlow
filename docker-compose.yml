services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=/api/v1
      - VITE_USE_MOCK_DATA=false
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - assetflow-network
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-assetflow}
      - POSTGRES_PORT=5432
      - SECRET_KEY=${SECRET_KEY:-949f538fa62bb2b0bcad31f6c498305f88410b0a880be0e527f311c82ec5cc7c}
      - BACKEND_CORS_ORIGINS=["http://localhost:5173","http://frontend:5173"]
    volumes:
      - ./backend:/app
    networks:
      - assetflow-network
    restart: unless-stopped
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-assetflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - assetflow-network
    restart: unless-stopped

networks:
  assetflow-network:
    driver: bridge

volumes:
  postgres_data:
