services:
  - type: web
    name: assetflow-backend
    env: python
    region: ohio
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: assetflow-db
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        value: '["http://localhost:5173", "https://YOUR_VERCEL_APP_URL.vercel.app"]'
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHONPATH
        value: "/opt/render/project/src/backend"

databases:
  - name: assetflow-db
    databaseName: assetflow
    user: assetflow_user
